intro: We welcome motivated students and researchers interested in biomedical science and brain-gut axis research.
openings_title: Current Openings
openings:
  - Ph.D. students (biomedicine, neuroscience, bioinformatics)
  - M.S. students with wet-lab or computational background
  - Research assistants / interns for ongoing projects
special_title: For Recommended Admission & Exam Candidates
special_paragraphs:
  - Students applying through recommended admission pathways or national graduate entrance examinations are strongly encouraged to contact us as early as possible.
  - Please email your CV, transcript, and a brief statement of research interests.
contact_email: hao.chang@pku.edu.cn
