hero_title_line1: Welcome to
hero_title_line2: Chang Hao Lab!
hero_paragraph_1: We are an interdisciplinary research group dedicated to uncovering mechanisms that connect the nervous system, gut physiology, immune responses, and metabolic health. Our mission is to translate fundamental discoveries into impactful biomedical solutions.
hero_paragraph_2: We combine experimental biology, clinical insight, and data-driven methods to address important questions in health and disease.
