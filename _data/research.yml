intro: Our lab focuses on fundamental and translational questions in biomedicine with a strong emphasis on the brain-gut axis.
cards:
  - title: Neurophysiological Mechanisms Underlying Brain–Body Interactions
    text: We study how the brain communicates with peripheral organs, focusing on neural circuit control of visceral function, stress responses, and systemic homeostasis.
  - title: Large-Scale Data Analysis of Neurological Disorders
    text: We integrate multimodal clinical and biological data to identify disease patterns, classify patient subtypes, and discover biomarkers for neurological disorders.
  - title: Development of Brain–Body Integrated Imaging Technologies
    text: We develop imaging and computational tools to capture brain–body signaling across scales and quantitatively map coordinated neural and peripheral changes in disease.
focus_title: Current Focus & Interest
focus_text: Guided by major national strategic needs in severe neurological disorders, our laboratory is dedicated to research on the brain–gut axis and brain–body interactions. We seek to elucidate how neural circuits regulate gastrointestinal function and to uncover the bidirectional interplay among stress, emotion, and the gut microbiota. Through these efforts, we aim to advance the understanding of the neural mechanisms underlying brain–body communication and to provide new insights into the diagnosis and treatment of neurological disorders.
